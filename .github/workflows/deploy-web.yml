name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: stable
  GODOT_TAG: 4.7-stable

jobs:
  export-web:
    name: Export and deploy Web build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install asset tools
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade fonttools pillow numpy c2pa-python

      - name: Cache Godot export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_RELEASE }}
          key: godot-${{ env.GODOT_TAG }}-web-templates-v1

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://github.com/godotengine/godot/releases/download/${GODOT_TAG}"
          mkdir -p "${RUNNER_TEMP}/godot"
          curl -L --retry 8 --retry-delay 5 \
            -o "${RUNNER_TEMP}/godot/godot.zip" \
            "${base_url}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q "${RUNNER_TEMP}/godot/godot.zip" -d "${RUNNER_TEMP}/godot"
          godot_bin="$(find "${RUNNER_TEMP}/godot" -type f -name "Godot_v${GODOT_TAG}_linux.x86_64" | head -n 1)"
          chmod +x "${godot_bin}"
          echo "GODOT_BIN=${godot_bin}" >> "${GITHUB_ENV}"
          "${godot_bin}" --version

      - name: Install Web export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          base_url="https://github.com/godotengine/godot/releases/download/${GODOT_TAG}"
          mkdir -p "${template_dir}"
          curl -L --retry 8 --retry-delay 5 \
            -o "${RUNNER_TEMP}/godot/export_templates.tpz" \
            "${base_url}/Godot_v${GODOT_TAG}_export_templates.tpz"
          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          tpz = Path(os.environ["RUNNER_TEMP"]) / "godot" / "export_templates.tpz"
          template_dir = Path.home() / ".local" / "share" / "godot" / "export_templates" / f"{os.environ['GODOT_VERSION']}.{os.environ['GODOT_RELEASE']}"
          with zipfile.ZipFile(tpz) as archive:
              for entry in archive.infolist():
                  if entry.filename.startswith("templates/web_") and not entry.is_dir():
                      target = template_dir / Path(entry.filename).name
                      target.write_bytes(archive.read(entry))
          PY
          ls -lh "${template_dir}"/web_*.zip

      - name: Rebuild UI font subset
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build_font_subset.py

      - name: Check sprite luminance and saturation
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_sprite_luminance.py

      - name: Check Wave 2 R25 provenance and parallax budgets
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/verify_r25_c2pa.py
          python3 tools/check_r25_parallax_gates.py

      - name: Import Godot resources
        shell: bash
        run: |
          set -euo pipefail
          # R25 起資產量成長，場景啟動時的隱式匯入會撞測試 watchdog；先顯式匯入（跑兩次讓字型/主題二次相依收斂）
          "${GODOT_BIN}" --headless --import --path . || true
          "${GODOT_BIN}" --headless --import --path . || true

      - name: Run Godot regression gates
        shell: bash
        run: |
          set -euo pipefail
          scenes=(
            R14RegressionTest
            R29MenuModalTest
            R30PlaytestFixTest
            TrueAnimationRegressionTest
            PoolContractTest
            GameplayCapTest
            SquadSmokeTest
            WeaponSmokeTest
            EnemyArtRegressionTest
            R25ParallaxRegressionTest
          )
          for scene in "${scenes[@]}"; do
            "${GODOT_BIN}" --headless --fixed-fps 60 --path . "res://scenes/debug/${scene}.tscn"
          done
          "${GODOT_BIN}" --headless --fixed-fps 60 --path . res://scenes/debug/R31EndgameGate.tscn -- --qa-endgame=r31

      - name: Inject build date
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          project = Path("project.godot")
          build_date = __import__("datetime").date.today().isoformat()
          lines = project.read_text(encoding="utf-8").splitlines()
          replaced = False
          for index, line in enumerate(lines):
              if line.startswith("config/build_date="):
                  lines[index] = f'config/build_date="{build_date}"'
                  replaced = True
                  break
          if not replaced:
              for index, line in enumerate(lines):
                  if line.startswith("config/version="):
                      lines.insert(index + 1, f'config/build_date="{build_date}"')
                      replaced = True
                      break
          if not replaced:
              raise SystemExit("application/config/build_date injection failed")
          project.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"build_date={build_date}")
          PY

      - name: Export Web build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          "${GODOT_BIN}" --headless --export-release "Web" "public/index.html"
          python3 tools/finalize_r25_web_export.py --dir public
          cp assets/art/cover.png public/cover.png
          touch public/.nojekyll
          find public -maxdepth 1 -type f -printf "%f %s bytes\n" | sort

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.58.2
          npx playwright install --with-deps chromium

      - name: Run Web performance and controls gates
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8067 --bind 127.0.0.1 --directory public > "${RUNNER_TEMP}/r25-http.log" 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT
          export UI_CAPTURE_PLAYWRIGHT="${GITHUB_WORKSPACE}/node_modules"
          export UI_CAPTURE_CHROME
          UI_CAPTURE_CHROME="$(node -e "console.log(require('playwright').chromium.executablePath())")"
          export R25_WEB_URL="http://127.0.0.1:8067/"
          export R25_WEB_BASELINE_JSON="docs/evidence/R25/web_performance_before.json"
          python3 tools/check_available_memory.py --label web-performance
          node tools/test_r25_web_performance.mjs
          export UI_CAPTURE_URL="http://127.0.0.1:8067/"
          export UI_CAPTURE_EVIDENCE_DIR="docs/evidence/R25/controls"
          python3 tools/check_available_memory.py --label controls
          node tools/test_controls_reachability.mjs
          export R30_PLAYTEST_SCREENSHOT="${RUNNER_TEMP}/r30-844x390-combat.png"
          node tools/test_r30_playtest.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
